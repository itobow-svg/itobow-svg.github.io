name: 楽天商品紹介 自動下書き作成

on:
  schedule:
    # UTC基準。日本時間の朝9:00頃に実行し、
    # Typefully側で当日21:00投稿になるよう下書きをスケジュールする
    - cron: "0 0 * * *"
  workflow_dispatch: {}  # 手動実行用ボタン

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存パッケージをインストール
        run: pip install requests

      - name: スクリプト実行
        env:
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          TYPEFULLY_API_KEY: ${{ secrets.TYPEFULLY_API_KEY }}
          MY_REGISTERED_URL: ${{ secrets.MY_REGISTERED_URL }}
        run: python scripts/post_to_threads.py
